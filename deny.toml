# `cargo deny` policy — runs in pre-commit and CI.
# Catches: unmaintained / vulnerable deps, incompatible licences, duplicate
# versions of the same crate, banned crates, unknown sources.
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
db-path  = "$CARGO_HOME/advisory-db"
db-urls  = ["https://github.com/rustsec/advisory-db"]
yanked   = "warn"
# Add advisory IDs here ONLY with a comment justifying why.
# All entries below are unmaintained-crate advisories on transitive deps we
# don't control (Tauri / wry / urlpattern). Re-evaluate when Tauri publishes
# a release that drops GTK3 / urlpattern.
ignore = [
    # gtk-rs GTK3 bindings — pulled in by wry/tauri-runtime-wry; no fix until
    # Tauri/wry migrate to GTK4 upstream.
    "RUSTSEC-2024-0411",  # gdkx11-sys
    "RUSTSEC-2024-0412",  # gdk
    "RUSTSEC-2024-0413",  # atk
    "RUSTSEC-2024-0415",  # gdk-sys
    "RUSTSEC-2024-0416",  # atk-sys
    "RUSTSEC-2024-0418",  # gdkx11
    "RUSTSEC-2024-0419",  # gtk
    "RUSTSEC-2024-0420",  # gtk-sys
    # unic-* family — pulled in by urlpattern → tauri-utils. RustSec note says
    # "no safe upgrade available" until urlpattern migrates off rust-unic.
    "RUSTSEC-2025-0075",  # unic-char-range
    "RUSTSEC-2025-0080",  # unic-common
    "RUSTSEC-2025-0081",  # unic-char-property
    "RUSTSEC-2025-0098",  # unic-ucd-version
    "RUSTSEC-2025-0100",  # unic-ucd-ident
    # Other transitive unmaintained crates with no upstream fix path.
    "RUSTSEC-2024-0370",  # proc-macro-error — via tauri-macros / older proc-macro deps
    "RUSTSEC-2025-0057",  # fxhash — transitive
    # quick-xml DoS advisories (fixed in >=0.41.0). Every reachable path is
    # already on 0.41 (plist/tauri chain bumped, tauri-winrt-notification 0.7.3
    # dropped its old copy). The lone holdout is wayland-scanner 0.31.10, which
    # pins quick-xml ^0.39 and has no newer release — a build-time proc-macro
    # parsing the trusted, bundled Wayland protocol XML (not attacker input, and
    # a plain Reader, which -0195 notes is unaffected). Drop these when
    # wayland-rs releases a wayland-scanner on quick-xml >=0.41.
    "RUSTSEC-2026-0194",  # quick-xml quadratic duplicate-attribute check
    "RUSTSEC-2026-0195",  # quick-xml unbounded NsReader namespace allocation
]

[licenses]
# Anything in `allow` is OK. Anything else aborts the build with a clear error
# pointing at the offending crate. Re-evaluate periodically.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",  # weak copyleft, file-level — fine for libraries we link against
    "Zlib",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions  = "warn"   # noisy; warn rather than deny
wildcards          = "deny"   # `version = "*"` is forbidden
highlight          = "all"
allow              = []
deny               = []
skip               = []
# Suppress duplicate-version warnings rooted in the Tauri/wry/webkit2gtk
# stack. Those subtrees pin dozens of crates at multiple versions
# (base64, bitflags, phf, rand, windows-sys, etc.) and aren't actionable
# for us — we don't choose those deps. Without this list the warnings
# emit ~7 k lines on every cargo-deny run, which is just noise.
skip-tree = [
    { name = "tauri" },
    { name = "tauri-build" },
    { name = "tauri-plugin-dialog" },
    { name = "tauri-plugin-notification" },
    { name = "wry" },
    { name = "webkit2gtk" },
    { name = "swift-rs" },
    { name = "windows" },
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
