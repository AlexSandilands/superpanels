name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build & publish
    # Build on the oldest supported runner for the widest glibc compatibility;
    # CI proper runs on 24.04. webkit2gtk-4.1 is available in 22.04 universe.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: cargo-bins/cargo-binstall@main
      - name: Install Tauri CLI
        run: cargo binstall -y --version '^2' tauri-cli

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into manifests
        run: packaging/set-version.sh "${{ steps.ver.outputs.version }}"

      - name: Build frontend bundle
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Build CLI + daemon
        run: cargo build --release -p superpanels-cli -p superpanels-daemon

      - name: Build GUI + Linux bundles (.deb/.rpm/.AppImage)
        working-directory: crates/superpanels-gui
        run: cargo tauri build

      - name: Assemble release artefacts
        run: packaging/assemble-release.sh "${{ steps.ver.outputs.version }}" x86_64

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
