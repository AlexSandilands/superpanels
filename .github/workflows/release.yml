name: Release

on:
  push:
    tags: ['v*']
  # Re-run just the pacman-repo publish against an existing release — for
  # testing the job or repairing the repo without cutting a new tag.
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release version to publish to the pacman repo (e.g. 0.2.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build & publish
    if: github.event_name == 'push'
    # Build on the oldest supported runner for the widest glibc compatibility;
    # CI proper runs on 24.04. webkit2gtk-4.1 is available in 22.04 universe.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: cargo-bins/cargo-binstall@main
      - name: Install Tauri CLI
        run: cargo binstall -y --version '^2' tauri-cli

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into manifests
        run: packaging/set-version.sh "${{ steps.ver.outputs.version }}"

      - name: Build frontend bundle
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Build CLI + daemon
        run: cargo build --release -p superpanels-cli -p superpanels-daemon

      - name: Build GUI + Linux bundles (.deb/.rpm/.AppImage)
        working-directory: crates/superpanels-gui
        # The frontend is already built by the step above; skip Tauri's
        # beforeBuildCommand (its `../../ui` resolves wrong under the CLI's
        # working dir) and bundle straight from the existing ui/dist.
        run: cargo tauri build --config '{"build":{"beforeBuildCommand":""}}'

      - name: Assemble release artefacts
        run: packaging/assemble-release.sh "${{ steps.ver.outputs.version }}" x86_64

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true

  pacman-repo:
    name: publish pacman repo
    # Stable tags only — rc/beta prereleases (any tag containing '-') stay off
    # the repo by design; bleeding-edge testers use `install.sh --prerelease`.
    # workflow_dispatch bypasses the tag gate to test or re-publish.
    needs: release
    if: >-
      !cancelled() && (
        (github.event_name == 'push' && needs.release.result == 'success' && !contains(github.ref_name, '-')) ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    permissions:
      contents: write
    steps:
      - name: Install tooling
        run: pacman -Syu --noconfirm git github-cli

      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then v="$INPUT_VERSION"; else v="$GITHUB_REF_NAME"; fi
          echo "version=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Build package and publish to gh-pages
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ github.token }}
          PACMAN_GPG_PRIVATE_KEY: ${{ secrets.PACMAN_GPG_PRIVATE_KEY }}
          PACMAN_GPG_PASSPHRASE: ${{ secrets.PACMAN_GPG_PASSPHRASE }}
        run: packaging/pacman-repo/publish.sh
